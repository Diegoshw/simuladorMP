<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador CAC + Financiamiento — DoctoRed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, Legend, ResponsiveContainer, ReferenceLine, ComposedChart, Area
} = Recharts;

function SimuladorCAC() {
  // Ventas mes a mes del primer año (curva de crecimiento) + valor fijo año 2+
  const [ventasY1, setVentasY1] = useState([1000, 1500, 2000, 2500, 3000, 3000, 3500, 3500, 4000, 4000, 4000, 4000]);
  const [ventasY2plus, setVentasY2plus] = useState(4000);
  const [ventasOS, setVentasOS] = useState(0);
  const [cuotaPromedio, setCuotaPromedio] = useState(65000);
  const [cacA, setCacA] = useState(4);
  const [cacC, setCacC] = useState(5);

  // Ventas de broker para un mes de venta dado (k = 1-indexed)
  const ventasBrokerEn = (k) => {
    if (k < 1) return 0;
    if (k <= 12) return ventasY1[k - 1];
    return ventasY2plus;
  };

  const [modoPago, setModoPago] = useState("C");

  const [cmY1H1, setCmY1H1] = useState(40);
  const [cmY1H2, setCmY1H2] = useState(50);
  const [cmY2, setCmY2] = useState(60);
  const [cmY3, setCmY3] = useState(70);
  const [churnMensual, setChurnMensual] = useState(1.5);

  const [tnaPct, setTnaPct] = useState(35);
  const PLAZO_PRESTAMO = 12;
  const tasaMensual = tnaPct / 12;

  const [meses, setMeses] = useState(36);

  const [aguinaldoEnabled, setAguinaldoEnabled] = useState(true);
  const [ivaBrokerEnabled, setIvaBrokerEnabled] = useState(true);
  const IVA_PCT = 21;
  const [valorizMultiplicador, setValorizMultiplicador] = useState(4);
  const [showDetailTable, setShowDetailTable] = useState(false);
  const [infoMetrica, setInfoMetrica] = useState(null);

  const todasLasSimulaciones = useMemo(() => {
    const horizonte = meses;
    const ivaFactor = ivaBrokerEnabled ? 1 + IVA_PCT / 100 : 1;

    const cohortStock = (saleMonth, m, count) => {
      if (m < saleMonth + 1) return 0;
      const monthsActive = m - saleMonth - 1;
      return count * Math.pow(1 - churnMensual / 100, monthsActive);
    };

    const getCostoPrestPct = (ageMonths) => {
      if (ageMonths <= 6) return cmY1H1;
      if (ageMonths <= 12) return cmY1H2;
      if (ageMonths <= 24) return cmY2;
      return cmY3;
    };

    const cuotaFrancesa = (capital) => {
      const i = tasaMensual / 100;
      if (i === 0) return capital / PLAZO_PRESTAMO;
      return (capital * i) / (1 - Math.pow(1 + i, -PLAZO_PRESTAMO));
    };

    const isAguinaldoMonth = (mes) => mes % 6 === 1;

    const totalStockByMonth = new Array(horizonte + 1).fill(0);
    const altasByMonth = new Array(horizonte + 1).fill(0);
    const bajasByMonth = new Array(horizonte + 1).fill(0);
    const facturacionGrossByMonth = new Array(horizonte + 1).fill(0);
    const facturacionBrokerByMonth = new Array(horizonte + 1).fill(0);
    for (let m = 1; m <= horizonte; m++) {
      let total = 0;
      for (let k = 1; k <= m - 1; k++) {
        total += cohortStock(k, m, ventasBrokerEn(k)) + cohortStock(k, m, ventasOS);
      }
      totalStockByMonth[m] = total;
      altasByMonth[m] = m >= 2 ? ventasBrokerEn(m - 1) + ventasOS : 0;
      bajasByMonth[m] = m >= 2 ? totalStockByMonth[m - 1] * (churnMensual / 100) : 0;
      let facturacion = 0;
      let facturacionBroker = 0;
      for (let k = 1; k <= m - 2; k++) {
        const fBroker = cohortStock(k, m - 1, ventasBrokerEn(k)) * cuotaPromedio;
        facturacion += fBroker + cohortStock(k, m - 1, ventasOS) * cuotaPromedio;
        facturacionBroker += fBroker;
      }
      facturacionGrossByMonth[m] = facturacion;
      facturacionBrokerByMonth[m] = facturacionBroker;
    }

    const runSim = (mode) => {
      const data = [];
      const prestamos = [];
      let totalInteresesPagados = 0;
      let totalCapitalSolicitado = 0;
      let deudaMaximaTracking = 0;

      for (let m = 1; m <= horizonte; m++) {
        // INGRESOS BROKER (recaudación regular)
        let ingresosBroker = 0;
        for (let k = 1; k <= m - 2; k++) {
          ingresosBroker += cohortStock(k, m - 1, ventasBrokerEn(k)) * cuotaPromedio;
        }

        // INGRESOS OS RECAUDACIÓN (95% desde edad 6+)
        let ingresosOSRecaudacion = 0;
        for (let k = 1; k <= m - 2; k++) {
          const age = m - k;
          if (age >= 6) {
            const stockOS = cohortStock(k, m - 1, ventasOS);
            ingresosOSRecaudacion += stockOS * cuotaPromedio * 0.95;
          }
        }

        // FINANCIACIÓN OS (one-time en mes de venta)
        const financiacionOS = ventasOS * 4 * cuotaPromedio;

        // AGUINALDO: 50% × (meses activos en últimos 6 / 6), en meses 1, 7, 13, 19...
        let aguinaldoBroker = 0;
        let aguinaldoOSRecaudacion = 0;
        if (aguinaldoEnabled && isAguinaldoMonth(m)) {
          for (let k = 1; k <= m - 2; k++) {
            const monthsInWindow = Math.max(0, Math.min(6, m - k - 1));
            if (monthsInWindow > 0) {
              const factor = monthsInWindow / 6;
              const stockBroker = cohortStock(k, m - 1, ventasBrokerEn(k));
              const stockOS = cohortStock(k, m - 1, ventasOS);
              const aguinaldoPorCapita = cuotaPromedio * 0.5 * factor;
              aguinaldoBroker += stockBroker * aguinaldoPorCapita;
              const age = m - k;
              if (age >= 6) {
                aguinaldoOSRecaudacion += stockOS * aguinaldoPorCapita * 0.95;
              }
            }
          }
        }

        // PRESTACIONAL: el costo de cobertura corre desde que la cápita tiene cobertura
        // activa (mes M+1 de la venta = m >= k+1), independientemente de cuándo ingresa
        // la recaudación. Se calcula sobre la cuota teórica de las cápitas con cobertura,
        // no sobre el ingreso recaudado. NO aplica sobre aguinaldo.
        let costoPrestacional = 0;
        let pctEfectivoMes = 0;
        {
          let baseTeorica = 0;
          for (let k = 1; k <= m - 1; k++) {
            const stockBroker = cohortStock(k, m, ventasBrokerEn(k));
            const stockOS = cohortStock(k, m, ventasOS);
            const baseCobertura = (stockBroker + stockOS) * cuotaPromedio;
            if (baseCobertura <= 0) continue;
            // Edad en meses de cobertura: M+1 = edad 1
            const edadCobertura = m - k;
            const pct = getCostoPrestPct(edadCobertura);
            costoPrestacional += baseCobertura * (pct / 100);
            baseTeorica += baseCobertura;
          }
          if (baseTeorica > 0) {
            pctEfectivoMes = (costoPrestacional / baseTeorica) * 100;
          }
        }

        // PAGO BROKER según modo (aplica a todas las ventas: broker + OS)
        // Regla transversal: la venta del mes M se factura en M+1, y los plazos de pago
        // se cuentan desde la factura. Por eso todos los modos se corren un mes.
        //   A: one-shot al facturar           -> M+1  (k=1)
        //   C: 3 cheques 60/90/120 días       -> M+3..M+5 (k=3..5)
        // Cada tramo se calcula sobre las ventas del mes que lo originó (m-k).
        // El IVA (21%) sobre el pago al broker se suma como costo de adquisición a financiar.
        const ventasOrigen = (k) => (m - k >= 1 ? ventasBrokerEn(m - k) + ventasOS : 0);
        let pagoBrokerNeto = 0;
        if (mode === "A") {
          pagoBrokerNeto = ventasOrigen(1) * cacA * cuotaPromedio;
        } else if (mode === "C") {
          for (let k = 3; k <= 5; k++) {
            pagoBrokerNeto += (ventasOrigen(k) * cacC * cuotaPromedio) / 3;
          }
        }
        const ivaBroker = pagoBrokerNeto * (ivaFactor - 1);
        const pagoBroker = pagoBrokerNeto + ivaBroker;

        // CUOTAS PRÉSTAMOS
        let cuotasPrestamos = 0;
        let interesesMes = 0;
        prestamos.forEach(p => {
          const mesesTrans = m - p.mesInicio;
          if (mesesTrans > 0 && mesesTrans <= PLAZO_PRESTAMO) {
            cuotasPrestamos += p.cuotaMensual;
            const interesPeriodo = p.saldoActual * (tasaMensual / 100);
            const capitalPeriodo = p.cuotaMensual - interesPeriodo;
            p.saldoActual -= capitalPeriodo;
            interesesMes += interesPeriodo;
          }
        });
        totalInteresesPagados += interesesMes;

        const totalIngresos = ingresosBroker + ingresosOSRecaudacion + financiacionOS + aguinaldoBroker + aguinaldoOSRecaudacion;
        const flujoOperativo = totalIngresos - costoPrestacional - pagoBroker - cuotasPrestamos;

        let nuevoPrestamo = 0;
        if (flujoOperativo < 0) {
          nuevoPrestamo = -flujoOperativo;
          prestamos.push({
            mesInicio: m,
            capital: nuevoPrestamo,
            saldoActual: nuevoPrestamo,
            cuotaMensual: cuotaFrancesa(nuevoPrestamo),
          });
          totalCapitalSolicitado += nuevoPrestamo;
        }

        const flujoNeto = flujoOperativo + nuevoPrestamo;
        const deudaVigente = prestamos.reduce((acc, p) => {
          const mt = m - p.mesInicio;
          if (mt >= 0 && mt < PLAZO_PRESTAMO) return acc + p.saldoActual;
          return acc;
        }, 0);
        if (deudaVigente > deudaMaximaTracking) deudaMaximaTracking = deudaVigente;

        data.push({
          mes: m,
          ingresosBroker: Math.round(ingresosBroker / 1_000_000),
          ingresosOSRecaudacion: Math.round(ingresosOSRecaudacion / 1_000_000),
          financiacionOS: Math.round(financiacionOS / 1_000_000),
          aguinaldoBroker: Math.round(aguinaldoBroker / 1_000_000),
          aguinaldoOSRecaudacion: Math.round(aguinaldoOSRecaudacion / 1_000_000),
          aguinaldo: Math.round((aguinaldoBroker + aguinaldoOSRecaudacion) / 1_000_000),
          ingresos: Math.round(totalIngresos / 1_000_000),
          costoPrestacional: Math.round(costoPrestacional / 1_000_000),
          pagoBroker: Math.round(pagoBroker / 1_000_000),
          pagoBrokerNeto: Math.round(pagoBrokerNeto / 1_000_000),
          ivaBroker: Math.round(ivaBroker / 1_000_000),
          cuotasPrestamos: Math.round(cuotasPrestamos / 1_000_000),
          interesesMes: Math.round(interesesMes / 1_000_000),
          flujoOperativo: Math.round(flujoOperativo / 1_000_000),
          nuevoPrestamo: Math.round(nuevoPrestamo / 1_000_000),
          flujoNeto: Math.round(flujoNeto / 1_000_000),
          deudaVigente: Math.round(deudaVigente / 1_000_000),
          stockCapitas: Math.round(totalStockByMonth[m]),
          altasMes: Math.round(altasByMonth[m]),
          bajasMes: Math.round(bajasByMonth[m]),
          facturacionGross: Math.round(facturacionGrossByMonth[m] / 1_000_000),
          facturacionBroker: Math.round(facturacionBrokerByMonth[m] / 1_000_000),
          facturacionBrokerRaw: facturacionBrokerByMonth[m],
          pctPrestEfectivo: Math.round(pctEfectivoMes * 10) / 10,
        });
      }

      let acumOp = 0;
      let mesPaybackFin = null;
      for (let i = 0; i < data.length; i++) {
        acumOp += data[i].flujoOperativo;
        data[i].acumuladoOperativo = Math.round(acumOp);
        if (acumOp > 0 && mesPaybackFin === null) {
          let acumTemp = acumOp;
          const sostenido = data.slice(i, Math.min(i + 6, data.length)).every(d => {
            acumTemp += d.flujoOperativo;
            return acumTemp > 0;
          });
          if (sostenido || i === data.length - 1) mesPaybackFin = data[i].mes;
        }
      }

      let saldoAcum = 0;
      data.forEach(d => {
        saldoAcum += d.flujoNeto;
        d.saldoAcumulado = Math.round(saldoAcum);
      });

      let mesAutosuficiencia = null;
      for (let i = 0; i < data.length; i++) {
        if (data[i].flujoOperativo > 0) {
          const futurosPos = data.slice(i, Math.min(i + 6, data.length)).every(d => d.flujoOperativo > 0);
          if (futurosPos || i === data.length - 1) {
            mesAutosuficiencia = data[i].mes;
            break;
          }
        }
      }

      // LTV (incluye aguinaldo si está habilitado)
      let ltv = 0;
      const horizonteLtv = 120;
      for (let t = 1; t <= horizonteLtv; t++) {
        const survival = Math.pow(1 - churnMensual / 100, t - 1);
        const pctPrest = t <= 6 ? cmY1H1 : t <= 12 ? cmY1H2 : t <= 24 ? cmY2 : cmY3;
        const margin = 1 - pctPrest / 100;
        ltv += cuotaPromedio * margin * survival;
        // Aguinaldo: cada 6 meses de vida del cápita, 50% extra (sin prestacional adicional)
        if (aguinaldoEnabled && t % 6 === 0) {
          ltv += cuotaPromedio * 0.5 * survival;
        }
      }
      const cacByMode = { A: cacA, C: cacC };
      // CAC en pesos: incluye IVA del broker si el toggle está activo (costo de adquisición pleno)
      const cacEnPesos = cacByMode[mode] * cuotaPromedio * ivaFactor;
      let totalAltas = 0;
      for (let k = 1; k <= horizonte; k++) totalAltas += ventasBrokerEn(k) + ventasOS;
      const costoFinancieroPorCapita = totalAltas > 0 ? totalInteresesPagados / totalAltas : 0;
      const cacEfectivo = cacEnPesos + costoFinancieroPorCapita;
      const ratioLtvCac = ltv / cacEfectivo;
      const deudaMaxima = deudaMaximaTracking;

      // VALORIZACIÓN DE CARTERA: facturación broker del último mes (sin aguinaldo) × multiplicador
      const facturacionUltimoMes = facturacionBrokerByMonth[horizonte];
      const valorizacionCartera = facturacionUltimoMes * valorizMultiplicador;

      return {
        data,
        mesAutosuficiencia,
        mesPaybackFin,
        cacEfectivo,
        cacEnPesos,
        ltv,
        ratioLtvCac,
        totalCapitalSolicitado,
        totalInteresesPagados,
        deudaMaxima,
        valorizacionCartera,
        facturacionUltimoMes,
        stockFinal: data[data.length - 1].stockCapitas,
        acumuladoFinal: data[data.length - 1].acumuladoOperativo,
      };
    };

    return { A: runSim("A"), C: runSim("C") };
  }, [ventasY1, ventasY2plus, ventasOS, cuotaPromedio, cacA, cacC, cmY1H1, cmY1H2, cmY2, cmY3, churnMensual, tnaPct, tasaMensual, meses, aguinaldoEnabled, ivaBrokerEnabled, valorizMultiplicador]);

  const simulacion = todasLasSimulaciones[modoPago];

  const mejorEn = (extractor, lowerIsBetter = true) => {
    const vals = ["A", "C"].map(m => ({ mode: m, v: extractor(todasLasSimulaciones[m]) }));
    const validos = vals.filter(x => x.v !== null && x.v !== undefined && !isNaN(x.v));
    if (validos.length === 0) return null;
    return validos.reduce((best, x) =>
      lowerIsBetter ? (x.v < best.v ? x : best) : (x.v > best.v ? x : best)
    ).mode;
  };

  const filasComparador = [
    { label: "Payback (meses)", A: todasLasSimulaciones.A.mesPaybackFin || "N/A", C: todasLasSimulaciones.C.mesPaybackFin || "N/A", mejor: mejorEn(s => s.mesPaybackFin, true) },
    { label: "Autosuficiencia (mes)", A: todasLasSimulaciones.A.mesAutosuficiencia || "N/A", C: todasLasSimulaciones.C.mesAutosuficiencia || "N/A", mejor: mejorEn(s => s.mesAutosuficiencia, true) },
    { label: "Deuda máxima", A: `$${Math.round(todasLasSimulaciones.A.deudaMaxima / 1_000_000).toLocaleString("es-AR")}M`, C: `$${Math.round(todasLasSimulaciones.C.deudaMaxima / 1_000_000).toLocaleString("es-AR")}M`, mejor: mejorEn(s => s.deudaMaxima, true) },
    { label: "Capital total solicitado", A: `$${Math.round(todasLasSimulaciones.A.totalCapitalSolicitado / 1_000_000).toLocaleString("es-AR")}M`, C: `$${Math.round(todasLasSimulaciones.C.totalCapitalSolicitado / 1_000_000).toLocaleString("es-AR")}M`, mejor: mejorEn(s => s.totalCapitalSolicitado, true) },
    { label: "Intereses totales pagados", A: `$${Math.round(todasLasSimulaciones.A.totalInteresesPagados / 1_000_000).toLocaleString("es-AR")}M`, C: `$${Math.round(todasLasSimulaciones.C.totalInteresesPagados / 1_000_000).toLocaleString("es-AR")}M`, mejor: mejorEn(s => s.totalInteresesPagados, true) },
    { label: `Acumulado final (mes ${meses})`, A: `$${todasLasSimulaciones.A.acumuladoFinal.toLocaleString("es-AR")}M`, C: `$${todasLasSimulaciones.C.acumuladoFinal.toLocaleString("es-AR")}M`, mejor: mejorEn(s => s.acumuladoFinal, false) },
    { label: "LTV / CAC", A: `${todasLasSimulaciones.A.ratioLtvCac.toFixed(1)}x`, C: `${todasLasSimulaciones.C.ratioLtvCac.toFixed(1)}x`, mejor: mejorEn(s => s.ratioLtvCac, false) },
  ];

  const formatMoney = (val) => `$${val.toLocaleString("es-AR")}M`;

  const semaforoPayback = simulacion.mesPaybackFin === null ? "rojo" : simulacion.mesPaybackFin <= 10 ? "verde" : simulacion.mesPaybackFin <= 24 ? "amarillo" : "rojo";
  const semaforoLtvCac = simulacion.ratioLtvCac > 3 ? "verde" : simulacion.ratioLtvCac > 1.5 ? "amarillo" : "rojo";
  const colorSemaforo = { verde: "bg-emerald-500", amarillo: "bg-amber-500", rojo: "bg-rose-500" };

  const modoDescripcion = {
    A: `${cacA} CAC one-shot al facturar (M+1)`,
    C: `${cacC} CAC en 3 cheques (60/90/120 días desde factura) — ${(cacC / 3).toFixed(2)} c/u`,
  };

  const colorMode = { A: "#0d9488", B: "#7c3aed", C: "#f59e0b" };

  // EJEMPLO DE UNA CÁPITA — cálculo dinámico según modo y parámetros actuales
  const ejemplo = useMemo(() => {
    const cacByMode = { A: cacA, C: cacC };
    const cac = cacByMode[modoPago];
    const cuota = cuotaPromedio;
    const pagoNeto = cac * cuota;
    const iva = ivaBrokerEnabled ? pagoNeto * (IVA_PCT / 100) : 0;
    const pagoConIva = pagoNeto + iva;
    // Cronograma de cheques según modo (en meses desde la venta, M = mes de venta)
    let cheques = [];
    if (modoPago === "A") {
      cheques = [{ mes: "M+1", desc: "al facturar", monto: pagoConIva }];
    } else {
      const c = pagoConIva / 3;
      cheques = [
        { mes: "M+3", desc: "60 días", monto: c },
        { mes: "M+4", desc: "90 días", monto: c },
        { mes: "M+5", desc: "120 días", monto: c },
      ];
    }
    const prestacionalMes1 = cuota * (cmY1H1 / 100);
    return { cac, cuota, pagoNeto, iva, pagoConIva, cheques, prestacionalMes1 };
  }, [modoPago, cacA, cacC, cuotaPromedio, ivaBrokerEnabled, cmY1H1]);

  const fmtPesos = (v) => `$${Math.round(v).toLocaleString("es-AR")}`;
  const fmtM = (v) => `$${(v / 1_000_000).toFixed(1)}M`;

  const InfoBtn = ({ k }) => (
    <button
      onClick={() => setInfoMetrica(k)}
      className="w-5 h-5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 text-xs font-bold inline-flex items-center justify-center transition flex-shrink-0 align-middle ml-1"
      title="¿Qué es?"
    >i</button>
  );

  const explicacionesMetricas = {
    "Payback": "Cantidad de meses hasta que el flujo operativo acumulado cruza a positivo de forma sostenida. Es el momento en que el negocio recuperó toda la inversión inicial, incluyendo los intereses de la deuda tomada para financiar el déficit.",
    "Autosuficiencia": "Primer mes en que el flujo operativo mensual se vuelve positivo de forma sostenida, sin necesidad de pedir nuevos préstamos. A partir de ahí el negocio se financia solo.",
    "Deuda máxima": "Stock máximo de deuda con el banco que se alcanza en algún mes del horizonte. Es el pico de exposición financiera: el monto máximo que vas a deber en simultáneo.",
    "Capital total solicitado": "Suma de todos los préstamos pedidos a lo largo del horizonte para cubrir los déficits mensuales. No es lo que debés en un momento dado, sino el total acumulado solicitado.",
    "Intereses totales pagados": "Costo financiero total: la suma de todos los intereses pagados por los préstamos tomados durante el horizonte. Es el precio de financiar el modelo a la TNA configurada.",
    "Acumulado final": "Flujo operativo acumulado al último mes del horizonte. Si es positivo, el negocio generó más caja de la que consumió; si es negativo, todavía no recuperó la inversión.",
    "LTV / CAC": "Relación entre el valor de vida del cliente (LTV: cuánto deja una cápita en margen durante toda su permanencia) y el costo de adquirirla (CAC, con IVA y costo financiero incluidos). >3x es saludable, 1,5-3x aceptable, <1,5x preocupante.",
    "Valorización de cartera": "Valor estimado de la cartera: la facturación de broker del último mes (sin aguinaldo) multiplicada por el factor configurable. Es una aproximación al valor de venta o transferencia de la cartera.",
    "Stock de cápitas activas": "Evolución mes a mes de la cantidad de cápitas activas en la cartera (broker + OS), ya descontadas las bajas por churn. Muestra el crecimiento neto del negocio.",
    "Altas y bajas mensuales": "Barras verdes: cápitas nuevas incorporadas cada mes (según la curva de ventas). Barras rojas: cápitas perdidas por churn ese mes. La diferencia es el crecimiento neto.",
    "Ingresos mensuales por cartera": "Lo que entra a ROISA cada mes: recaudación del canal broker (100%), recaudación del canal OS (95%, desde el mes 6) y aguinaldo. No incluye la financiación inicial del canal OS.",

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">4. Inicio del gasto prestacional (mes M+1)</h4>
                  <p>La cobertura médica se activa en M+1 (el mes siguiente a la venta), aunque todavía no se haya cobrado ninguna cuota. Desde ese mes corre el costo prestacional, calculado sobre la cuota teórica de las cápitas con cobertura activa. En el primer tramo de vida (meses 1-6) el prestacional es {cmY1H1}% de la cuota = {fmtPesos(ejemplo.prestacionalMes1)} por cápita por mes. Este porcentaje sube según la edad de la cápita ({cmY1H1}% → {cmY1H2}% → {cmY2}% → {cmY3}%).</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">5. Primer ingreso por recaudación (mes M+2)</h4>
                  <p>La primera cuota se recauda en M+2. A partir de ahí la cápita aporta su cuota mensual ({fmtPesos(ejemplo.cuota)}) mientras siga activa. Hay entonces una ventana de dos meses (M+1 y parte de M+2) donde ya hay costo prestacional pero todavía no entró recaudación de esa cápita.</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">6. Churn (bajas)</h4>
                  <p>Cada mes, un {churnMensual}% de las cápitas activas se da de baja. La cartera neta crece cuando las altas superan a las bajas. El churn se aplica de forma compuesta sobre el stock de cada cohorte.</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">7. Cuándo y cuánta deuda se toma</h4>
                  <p>El modelo calcula el flujo operativo de cada mes (ingresos − prestacional − pago broker). Si en algún mes el flujo es negativo, se toma un préstamo por el monto exacto del déficit de ese mes — ni más ni menos. No se acumula caja excedente de meses anteriores para cubrir déficits futuros: cada bache se financia con deuda nueva.</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">8. Costo financiero de cada adquisición</h4>
                  <p>Cada préstamo se toma a {tnaPct}% TNA ({tasaMensual.toFixed(2)}% mensual), a 12 meses, con sistema francés (cuota constante). Los intereses totales pagados se reparten entre todas las cápitas adquiridas para calcular el costo financiero por cápita, que se suma al CAC para obtener el "CAC efectivo" usado en la relación LTV/CAC.</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">9. Aguinaldo {aguinaldoEnabled ? "(activo)" : "(desactivado)"}</h4>
                  <p>{aguinaldoEnabled ? `Cada 6 meses se cobra un aguinaldo equivalente a 50% de la cuota, ponderado por los meses activos de la cápita en el semestre (50% × cuota × meses_activos/6). No genera costo prestacional adicional.` : "El aguinaldo está desactivado en esta configuración."}</p>
                </div>

                <div>
                  <h4 className="font-bold text-slate-900 mb-1">10. Valorización de cartera</h4>
                  <p>Es una estimación del valor de la cartera: la facturación de broker del último mes del horizonte (sin aguinaldo) multiplicada por el factor configurable (×{valorizMultiplicador}). Representa una aproximación al valor de venta o transferencia de la cartera madura.</p>
                </div>
              </div>

              <div className="mt-6 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-xl p-5 border-2 border-emerald-200">
                <h4 className="font-bold text-slate-900 mb-3 flex items-center gap-2">
                  <span className="bg-emerald-600 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded">Ejemplo</span>
                  Ciclo de vida de una cápita (modo {modoPago})
                </h4>
                <p className="text-xs text-slate-600 mb-4">Seguimiento de una sola cápita vendida en el mes M, con los parámetros actuales: cuota {fmtPesos(ejemplo.cuota)}, CAC {ejemplo.cac}{ivaBrokerEnabled ? `, IVA ${IVA_PCT}%` : ""}.</p>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="border-b-2 border-emerald-200 text-left">
                        <th className="py-2 px-2 font-semibold text-slate-700">Mes</th>
                        <th className="py-2 px-2 font-semibold text-slate-700">Qué pasa</th>
                        <th className="py-2 px-2 font-semibold text-emerald-700 text-right">Ingreso</th>
                        <th className="py-2 px-2 font-semibold text-rose-700 text-right">Egreso</th>
                      </tr>
                    </thead>
                    <tbody className="font-mono">
                      <tr className="border-b border-emerald-100">
                        <td className="py-2 px-2 font-bold">M</td>
                        <td className="py-2 px-2 font-sans">Venta de la cápita</td>
                        <td className="py-2 px-2 text-right text-slate-400">—</td>
                        <td className="py-2 px-2 text-right text-slate-400">—</td>
                      </tr>
                      <tr className="border-b border-emerald-100">
                        <td className="py-2 px-2 font-bold">M+1</td>
                        <td className="py-2 px-2 font-sans">Broker factura · inicia cobertura · arranca prestacional ({cmY1H1}%){modoPago === "A" ? " · pago broker" : ""}</td>
                        <td className="py-2 px-2 text-right text-slate-400">—</td>
                        <td className="py-2 px-2 text-right text-rose-700">{fmtPesos(ejemplo.prestacionalMes1 + (modoPago === "A" ? ejemplo.pagoConIva : 0))}</td>
                      </tr>
                      <tr className="border-b border-emerald-100">
                        <td className="py-2 px-2 font-bold">M+2</td>
                        <td className="py-2 px-2 font-sans">Primer cobro de cuota · prestacional</td>
                        <td className="py-2 px-2 text-right text-emerald-700">{fmtPesos(ejemplo.cuota)}</td>
                        <td className="py-2 px-2 text-right text-rose-700">{fmtPesos(ejemplo.prestacionalMes1)}</td>
                      </tr>
                      <tr className="border-b border-emerald-100">
                        <td className="py-2 px-2 font-bold">M+3</td>
                        <td className="py-2 px-2 font-sans">Cuota · prestacional{modoPago === "C" ? " · 1er cheque broker" : ""}</td>
                        <td className="py-2 px-2 text-right text-emerald-700">{fmtPesos(ejemplo.cuota)}</td>
                        <td className="py-2 px-2 text-right text-rose-700">{fmtPesos(ejemplo.prestacionalMes1 + (modoPago === "C" ? ejemplo.pagoConIva / 3 : 0))}</td>
                      </tr>
                      <tr>
                        <td className="py-2 px-2 font-bold">M+4 …</td>
                        <td className="py-2 px-2 font-sans">Continúan cuotas, prestacional y cheques pendientes hasta saldar la comisión</td>
                        <td className="py-2 px-2 text-right text-emerald-700">{fmtPesos(ejemplo.cuota)}/mes</td>
                        <td className="py-2 px-2 text-right text-slate-500">según modo</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div className="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div className="bg-white rounded-lg p-3 border border-emerald-100">
                    <p className="text-[10px] text-slate-500 uppercase tracking-wide">Costo adquisición total</p>
                    <p className="text-lg font-bold text-rose-700">{fmtPesos(ejemplo.pagoConIva)}</p>
                    <p className="text-[10px] text-slate-500">{ivaBrokerEnabled ? `incluye IVA ${fmtPesos(ejemplo.iva)}` : "sin IVA"}</p>
                  </div>
                  <div className="bg-white rounded-lg p-3 border border-emerald-100">
                    <p className="text-[10px] text-slate-500 uppercase tracking-wide">Cuota mensual</p>
                    <p className="text-lg font-bold text-emerald-700">{fmtPesos(ejemplo.cuota)}</p>
                    <p className="text-[10px] text-slate-500">desde M+2, mientras siga activa</p>
                  </div>
                  <div className="bg-white rounded-lg p-3 border border-emerald-100">
                    <p className="text-[10px] text-slate-500 uppercase tracking-wide">Prestacional inicial</p>
                    <p className="text-lg font-bold text-amber-700">{fmtPesos(ejemplo.prestacionalMes1)}</p>
                    <p className="text-[10px] text-slate-500">{cmY1H1}% de la cuota (meses 1-6)</p>
                  </div>
                </div>
              </div>
            </div>

            <p className="text-xs text-slate-400 mt-4 leading-relaxed text-center">
              v17 — Modelo de cohortes con maduración independiente. Cada déficit mensual financiado a {tnaPct}% TNA, 12 meses, sistema francés. {aguinaldoEnabled ? "Aguinaldo (50% × cuota × meses_activos/6) cobrado cada 6 meses. " : "Aguinaldo desactivado. "}{ivaBrokerEnabled ? `IVA ${IVA_PCT}% sobre pago al broker incluido en el costo de adquisición.` : "IVA broker desactivado."}
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SimuladorCAC />);
</script>
</body>
</html>
